<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MestMall CRM</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,sans-serif}
input,select,textarea{width:100%;padding:8px 10px;font-size:13px;border:0.5px solid #ccc;border-radius:8px;background:#fff;color:#111}
input:focus,select:focus,textarea:focus{outline:none;border-color:#1d9e75;box-shadow:0 0 0 2px #1d9e7530}
button{cursor:pointer;font-family:inherit}
body{background:#f3f4f6;min-height:100vh}
.app{min-height:600px;background:#f3f4f6}
.topbar{background:#fff;border-bottom:1px solid #e5e7eb;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar h1{font-size:15px;font-weight:600;color:#111}
.topbar p{font-size:11px;color:#6b7280;margin-top:1px}
.btn{padding:7px 14px;border-radius:8px;border:1px solid #d1d5db;background:transparent;color:#111;font-size:13px}
.btn:hover{background:#f3f4f6}
.btn-green{background:#1d9e75;border-color:#1d9e75;color:#fff}
.btn-green:hover{background:#0f6e56}
.btn-red{border-color:#e24b4a;color:#a32d2d}
.btn-red:hover{background:#fcebeb}
.btn-sm{padding:5px 10px;font-size:12px}
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:2px 9px;border-radius:20px;border:1px solid transparent}
.b-olumlu{background:#e1f5ee;color:#085041;border-color:#9fe1cb}
.b-beklemede{background:#faeeda;color:#633806;border-color:#fac775}
.b-olumsuz{background:#fcebeb;color:#791f1f;border-color:#f7c1c1}
.b-iletisimde{background:#e6f1fb;color:#0c447c;border-color:#b5d4f4}
.b-baslanmadi{background:#f1efe8;color:#444441;border-color:#d3d1c7}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:16px 20px 0}
.stat{background:#fff;border-radius:8px;padding:10px 14px;border:1px solid #f0f0f0}
.stat-label{font-size:11px;color:#6b7280;margin-bottom:3px}
.stat-val{font-size:22px;font-weight:600;color:#111}
.toolbar{padding:12px 20px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.search-input{flex:1;min-width:150px}
.filt{padding:5px 12px;border-radius:20px;border:1px solid #e5e7eb;background:transparent;color:#6b7280;font-size:12px}
.filt:hover{background:#f3f4f6}
.filt.active{background:#1d9e75;border-color:#1d9e75;color:#fff}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px;padding:0 20px 24px}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:14px;cursor:pointer;transition:border-color .15s}
.card:hover{border-color:#1d9e75}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px}
.card-ad{font-size:13px;font-weight:600;color:#111;line-height:1.3}
.card-meta{font-size:12px;color:#6b7280;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-not{font-size:11px;color:#9ca3af;border-top:1px solid #f3f4f6;padding-top:8px;margin-top:8px;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.screen{display:none}
.screen.active{display:block}
.detail-page{background:#f3f4f6;min-height:600px}
.back-bar{background:#fff;border-bottom:1px solid #e5e7eb;padding:10px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.back-bar-title{font-size:15px;font-weight:600;color:#111}
.back-bar-actions{margin-left:auto;display:flex;gap:8px}
.detail-body{max-width:700px;margin:0 auto;padding:20px}
.dcard{background:#fff;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;margin-bottom:16px}
.dcard-head{padding:12px 16px;border-bottom:1px solid #f3f4f6;display:flex;align-items:center;justify-content:space-between}
.dcard-title{font-size:11px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.05em}
.irow{display:flex;gap:16px;padding:10px 16px;border-bottom:1px solid #f9fafb}
.irow:last-child{border-bottom:none}
.ilabel{font-size:12px;color:#6b7280;width:120px;flex-shrink:0;padding-top:1px}
.ival{font-size:13px;color:#111;word-break:break-word;line-height:1.5}
.ival a{color:#1d9e75;text-decoration:none}
.ival a:hover{text-decoration:underline}
.temas-list{padding:4px 0}
.temas-item{display:flex;gap:12px;padding:12px 16px;border-bottom:1px solid #f9fafb}
.temas-item:last-child{border-bottom:none}
.temas-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-top:1px}
.ti-telefon{background:#e1f5ee}
.ti-eposta{background:#e6f1fb}
.ti-whatsapp{background:#eaf3de}
.ti-ziyaret{background:#eeedfe}
.temas-content{flex:1;min-width:0}
.temas-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:5px}
.temas-tarih{font-size:11px;color:#6b7280}
.temas-kanal-badge{font-size:11px;padding:1px 8px;border-radius:10px;background:#f3f4f6;color:#6b7280}
.temas-kisi{font-size:11px;color:#9ca3af}
.temas-ozet{font-size:13px;color:#111;line-height:1.5;margin-bottom:4px}
.temas-sonraki{font-size:11px;color:#854f0b;background:#faeeda;border-radius:4px;padding:3px 8px;display:inline-block;margin-top:2px}
.temas-acts{display:flex;gap:12px;margin-top:6px}
.tact{font-size:11px;color:#9ca3af;background:none;border:none;padding:0}
.tact:hover{color:#111}
.tact.red:hover{color:#a32d2d}
.empty-state{text-align:center;padding:40px 20px;color:#9ca3af;font-size:13px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:50;justify-content:center;align-items:flex-start;padding:60px 16px}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;border:1px solid #e5e7eb;width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
.modal-head{padding:14px 18px;border-bottom:1px solid #f3f4f6;display:flex;justify-content:space-between;align-items:center}
.modal-head h2{font-size:14px;font-weight:600;color:#111}
.xbtn{background:none;border:none;font-size:20px;color:#9ca3af;line-height:1;padding:0 2px}
.xbtn:hover{color:#111}
.modal-body{padding:18px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:11px;font-weight:600;color:#6b7280;margin-bottom:5px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.factions{display:flex;gap:8px;margin-top:18px}
.factions .btn{flex:1;text-align:center;padding:9px}
.errmsg{font-size:12px;color:#a32d2d;background:#fcebeb;border-radius:8px;padding:8px 12px;margin-bottom:12px}
textarea{resize:vertical;min-height:80px}
.no-results{grid-column:1/-1;text-align:center;padding:48px;color:#9ca3af;font-size:13px}
@media(max-width:640px){
  .stats{grid-template-columns:repeat(3,1fr)}
  .stats .stat:nth-child(4),.stats .stat:nth-child(5){display:none}
  .topbar{flex-wrap:wrap;gap:8px}
  .topbar .btn{width:100%}
  .toolbar{gap:6px}
  .filt{padding:4px 8px;font-size:11px}
  .grid{grid-template-columns:1fr;padding:0 12px 20px}
  .detail-body{padding:12px}
  .back-bar{flex-wrap:wrap;gap:6px}
  .back-bar-actions{margin-left:0;width:100%;display:flex;gap:6px}
  .back-bar-actions .btn{flex:1;text-align:center}
  .frow{grid-template-columns:1fr}
  .modal{margin:0 8px;max-height:92vh}
  .overlay{padding:20px 0;align-items:flex-end}
  .modal{border-radius:12px 12px 0 0}
  .irow{flex-direction:column;gap:4px}
  .ilabel{width:auto}
  .temas-meta{gap:5px}
  .stats{padding:12px 12px 0}
  .toolbar{padding:10px 12px}
  .grid{padding:0 12px 20px}
}
@media(max-width:400px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .stats .stat:nth-child(3){display:none}
}
</style>
</head>
<body>

<div id="root">

<div id="page-list" class="screen active app">
  <div class="topbar">
    <div><h1>MestMall CRM</h1><p>Hedef firma yönetimi</p></div>
    <button class="btn btn-green" onclick="openFirmaModal(null)">+ Yeni firma</button>
  </div>
  <div class="stats" id="stats-row"></div>
  <div class="toolbar">
    <input id="search" class="search-input" placeholder="Firma veya kişi ara..." oninput="renderGrid()">
    <button class="filt active" data-d="tumu" onclick="setFilter(this)">Tümü</button>
    <button class="filt" data-d="olumlu" onclick="setFilter(this)">Olumlu</button>
    <button class="filt" data-d="beklemede" onclick="setFilter(this)">Beklemede</button>
    <button class="filt" data-d="iletisimde" onclick="setFilter(this)">İletişimde</button>
    <button class="filt" data-d="olumsuz" onclick="setFilter(this)">Ulaşılamadı</button>
    <button class="filt" data-d="baslanmadi" onclick="setFilter(this)">Başlanmadı</button>
  </div>
  <div class="grid" id="firma-grid"></div>
</div>

<div id="page-detail" class="screen app detail-page">
  <div class="back-bar">
    <button class="btn btn-sm" onclick="showPage('list')">← Geri</button>
    <span class="back-bar-title" id="det-title"></span>
    <span id="det-badge"></span>
    <div class="back-bar-actions" id="det-actions"></div>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<div class="overlay" id="firma-modal">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-head"><h2 id="fmodal-title">Yeni firma ekle</h2><button class="xbtn" onclick="closeModal('firma-modal')">&times;</button></div>
    <div class="modal-body">
      <div id="firma-err" style="display:none" class="errmsg"></div>
      <div class="fg"><label>Firma adı *</label><input id="f-ad" placeholder="Firma adı girin"></div>
      <div class="frow">
        <div class="fg"><label>Web sitesi</label><input id="f-web" placeholder="www.firma.com"></div>
        <div class="fg"><label>Telefon</label><input id="f-tel" placeholder="0212 000 00 00"></div>
      </div>
      <div class="frow">
        <div class="fg"><label>Referans kişi</label><input id="f-ref" placeholder="Ad soyad"></div>
        <div class="fg"><label>Odak kişi</label><input id="f-odak" placeholder="Ad, unvan"></div>
      </div>
      <div class="fg"><label>Ürün / firma notları</label><textarea id="f-not" placeholder="Ürünler, önemli notlar..."></textarea></div>
      <div class="fg"><label>Durum</label>
        <select id="f-durum">
          <option value="baslanmadi">Başlanmadı</option>
          <option value="iletisimde">İletişimde</option>
          <option value="beklemede">Beklemede</option>
          <option value="olumlu">Olumlu</option>
          <option value="olumsuz">Ulaşılamadı / Olumsuz</option>
        </select>
      </div>
      <div class="factions">
        <button class="btn" onclick="closeModal('firma-modal')">İptal</button>
        <button class="btn btn-green" onclick="saveFirma()">Kaydet</button>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="temas-modal">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-head"><h2 id="tmodal-title">Yeni temas kaydı</h2><button class="xbtn" onclick="closeModal('temas-modal')">&times;</button></div>
    <div class="modal-body">
      <div id="temas-err" style="display:none" class="errmsg"></div>
      <div class="frow">
        <div class="fg"><label>Tarih</label><input type="date" id="t-tarih"></div>
        <div class="fg"><label>Kanal</label>
          <select id="t-kanal">
            <option value="telefon">Telefon</option>
            <option value="eposta">E-posta</option>
            <option value="whatsapp">WhatsApp</option>
            <option value="ziyaret">Ziyaret</option>
          </select>
        </div>
      </div>
      <div class="fg"><label>Görüşülen kişi</label><input id="t-kisi" placeholder="Ad, unvan"></div>
      <div class="fg"><label>Görüşme özeti *</label><textarea id="t-ozet" placeholder="Ne konuşuldu, ne söylendi..."></textarea></div>
      <div class="fg"><label>Sonuç</label>
        <select id="t-sonuc">
          <option value="beklemede">Beklemede</option>
          <option value="olumlu">Olumlu</option>
          <option value="cevap_yok">Cevap yok</option>
          <option value="olumsuz">Olumsuz</option>
        </select>
      </div>
      <div class="fg"><label>Sonraki adım</label><input id="t-adim" placeholder="16.03.2026'da tekrar ara..."></div>
      <div class="factions">
        <button class="btn" onclick="closeModal('temas-modal')">İptal</button>
        <button class="btn btn-green" onclick="saveTemas()">Kaydet</button>
      </div>
    </div>
  </div>
</div>

</div>

function init(){
  SEED.forEach(function(s){var id=DB.newFirmaId();DB.firmalar.push(Object.assign({id:id,olusturma:new Date().toISOString(),son_temas:null},s));});
  SEED_TEMAS.forEach(function(t){var firma=DB.firmalar.find(function(f){return f.ad===t.firma_ad;});if(!firma)return;var id=DB.newTemasId();DB.temas.push({id:id,firma_id:firma.id,tarih:t.tarih,kanal:t.kanal,kisi:t.kisi,ozet:t.ozet,sonuc:t.sonuc,sonraki_adim:t.sonraki_adim});if(!firma.son_temas||t.tarih>firma.son_temas)firma.son_temas=t.tarih;});
  renderStats();renderGrid();
}
function badge(durum){var labels={olumlu:'Olumlu',beklemede:'Beklemede',olumsuz:'Ulaşılamadı',iletisimde:'İletişimde',baslanmadi:'Başlanmadı'};return '<span class="badge b-'+durum+'">'+(labels[durum]||durum)+'</span>';}
function renderStats(){var counts={olumlu:0,beklemede:0,iletisimde:0,olumsuz:0,baslanmadi:0};DB.firmalar.forEach(function(f){counts[f.durum]++;});document.getElementById('stats-row').innerHTML='<div class="stat"><div class="stat-label">Toplam</div><div class="stat-val">'+DB.firmalar.length+'</div></div><div class="stat"><div class="stat-label">Olumlu</div><div class="stat-val" style="color:#085041">'+counts.olumlu+'</div></div><div class="stat"><div class="stat-label">Beklemede</div><div class="stat-val" style="color:#633806">'+counts.beklemede+'</div></div><div class="stat"><div class="stat-label">İletişimde</div><div class="stat-val" style="color:#0c447c">'+counts.iletisimde+'</div></div><div class="stat"><div class="stat-label">Ulaşılamadı</div><div class="stat-val" style="color:#791f1f">'+counts.olumsuz+'</div></div>';}
function setFilter(btn){document.querySelectorAll('.filt').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');DB.activeFilter=btn.dataset.d;renderGrid();}
function renderGrid(){var q=document.getElementById('search').value.toLowerCase();var list=DB.firmalar.filter(function(f){var matchF=DB.activeFilter==='tumu'||f.durum===DB.activeFilter;var matchQ=!q||f.ad.toLowerCase().includes(q)||(f.odak_kisi||'').toLowerCase().includes(q);return matchF&&matchQ;}).sort(function(a,b){return a.ad.localeCompare(b.ad,'tr');});if(!list.length){document.getElementById('firma-grid').innerHTML='<div class="no-results">Sonuç bulunamadı.</div>';return;}document.getElementById('firma-grid').innerHTML=list.map(function(f){var sonT=f.son_temas?'<div class="card-meta" style="margin-top:4px">Son temas: '+f.son_temas+'</div>':'';var not=f.urun_notlari?'<div class="card-not">'+esc(f.urun_notlari)+'</div>':'';return '<div class="card" onclick="showDetail('+f.id+')"><div class="card-header"><span class="card-ad">'+esc(f.ad)+'</span>'+badge(f.durum)+'</div>'+(f.odak_kisi?'<div class="card-meta">'+esc(f.odak_kisi)+'</div>':'')+(f.telefon?'<div class="card-meta">'+esc(f.telefon)+'</div>':'')+sonT+not+'</div>';}).join('');}
function showDetail(id){var f=DB.firmalar.find(function(x){return x.id===id;});if(!f)return;DB.activeFirmaId=id;document.getElementById('det-title').textContent=f.ad;document.getElementById('det-badge').innerHTML=badge(f.durum);document.getElementById('det-actions').innerHTML='<button class="btn btn-sm" onclick="openFirmaModal('+id+')">Düzenle</button><button class="btn btn-sm btn-red" onclick="confirmDeleteFirma('+id+')">Sil</button>';renderDetailBody(f);showPage('detail');}
function renderDetailBody(f){var rows=[['Web sitesi',f.web?'<a href="'+(f.web.startsWith('http')?f.web:'https://'+f.web)+'" target="_blank">'+esc(f.web)+'</a>':''],['Telefon',esc(f.telefon||'')],['Referans kişi',esc(f.referans_kisi||'')],['Odak kişi',esc(f.odak_kisi||'')],['Ürün / notlar',esc(f.urun_notlari||'')]].filter(function(r){return r[1];}).map(function(r){return '<div class="irow"><span class="ilabel">'+r[0]+'</span><span class="ival">'+r[1]+'</span></div>';}).join('');var temasList=DB.temas.filter(function(t){return t.firma_id===f.id;}).sort(function(a,b){return b.tarih.localeCompare(a.tarih);});var temasHtml=temasList.length?temasList.map(function(t){var icons={telefon:'📞',eposta:'✉',whatsapp:'💬',ziyaret:'🤝'};var cls={telefon:'ti-telefon',eposta:'ti-eposta',whatsapp:'ti-whatsapp',ziyaret:'ti-ziyaret'};var sonucLabels={olumlu:'Olumlu',beklemede:'Beklemede',cevap_yok:'Cevap yok',olumsuz:'Olumsuz'};var sonucColors={olumlu:'#085041',beklemede:'#633806',cevap_yok:'#444441',olumsuz:'#791f1f'};return '<div class="temas-item"><div class="temas-icon '+(cls[t.kanal]||'ti-telefon')+'" style="font-size:13px">'+(icons[t.kanal]||'📞')+'</div><div class="temas-content"><div class="temas-meta"><span class="temas-tarih">'+t.tarih+'</span><span class="temas-kanal-badge">'+t.kanal+'</span>'+(t.kisi?'<span class="temas-kisi">'+esc(t.kisi)+'</span>':'')+'</div><div class="temas-ozet">'+esc(t.ozet)+'</div>'+(t.sonuc?'<div style="font-size:11px;color:'+(sonucColors[t.sonuc]||'#444')+'">Sonuç: '+(sonucLabels[t.sonuc]||t.sonuc)+'</div>':'')+(t.sonraki_adim?'<div class="temas-sonraki">→ '+esc(t.sonraki_adim)+'</div>':'')+'<div class="temas-acts"><button class="tact" onclick="openTemasModal('+t.id+')">Düzenle</button><button class="tact red" onclick="deleteTemas('+t.id+')">Sil</button></div></div></div>';}).join(''):'<div class="empty-state">Henüz temas kaydı yok.<br><button class="btn btn-sm btn-green" style="margin-top:12px" onclick="openTemasModal(null)">İlk temas kaydını ekle</button></div>';document.getElementById('detail-body').innerHTML='<div class="dcard"><div class="dcard-head"><span class="dcard-title">Firma bilgileri</span></div>'+rows+'</div><div class="dcard"><div class="dcard-head"><span class="dcard-title">Temas geçmişi ('+temasList.length+')</span><button class="btn btn-sm btn-green" onclick="openTemasModal(null)">+ Temas ekle</button></div><div class="temas-list">'+temasHtml+'</div></div>';}
function confirmDeleteFirma(id){if(!confirm('Bu firmayı silmek istediğinize emin misiniz?'))return;DB.firmalar=DB.firmalar.filter(function(f){return f.id!==id;});DB.temas=DB.temas.filter(function(t){return t.firma_id!==id;});renderStats();renderGrid();showPage('list');}
function deleteTemas(id){if(!confirm('Bu temas kaydını silmek istiyor musunuz?'))return;DB.temas=DB.temas.filter(function(t){return t.id!==id;});updateSonTemas(DB.activeFirmaId);var f=DB.firmalar.find(function(x){return x.id===DB.activeFirmaId;});if(f)renderDetailBody(f);}
function updateSonTemas(firmaId){var firma=DB.firmalar.find(function(f){return f.id===firmaId;});if(!firma)return;var ts=DB.temas.filter(function(t){return t.firma_id===firmaId;});firma.son_temas=ts.length?ts.sort(function(a,b){return b.tarih.localeCompare(a.tarih);})[0].tarih:null;}
function openFirmaModal(id){DB.editFirmaId=id;var err=document.getElementById('firma-err');err.style.display='none';err.textContent='';if(id){var f=DB.firmalar.find(function(x){return x.id===id;});document.getElementById('fmodal-title').textContent='Firma düzenle';document.getElementById('f-ad').value=f.ad;document.getElementById('f-web').value=f.web||'';document.getElementById('f-tel').value=f.telefon||'';document.getElementById('f-ref').value=f.referans_kisi||'';document.getElementById('f-odak').value=f.odak_kisi||'';document.getElementById('f-not').value=f.urun_notlari||'';document.getElementById('f-durum').value=f.durum||'baslanmadi';}else{document.getElementById('fmodal-title').textContent='Yeni firma ekle';['f-ad','f-web','f-tel','f-ref','f-odak','f-not'].forEach(function(id){document.getElementById(id).value='';});document.getElementById('f-durum').value='baslanmadi';}document.getElementById('firma-modal').classList.add('open');}
function saveFirma(){var ad=document.getElementById('f-ad').value.trim();if(!ad){var err=document.getElementById('firma-err');err.textContent='Firma adı zorunludur.';err.style.display='block';return;}var data={ad:ad,web:document.getElementById('f-web').value.trim(),telefon:document.getElementById('f-tel').value.trim(),referans_kisi:document.getElementById('f-ref').value.trim(),odak_kisi:document.getElementById('f-odak').value.trim(),urun_notlari:document.getElementById('f-not').value.trim(),durum:document.getElementById('f-durum').value};if(DB.editFirmaId){var f=DB.firmalar.find(function(x){return x.id===DB.editFirmaId;});Object.assign(f,data);document.getElementById('det-title').textContent=f.ad;document.getElementById('det-badge').innerHTML=badge(f.durum);renderDetailBody(f);}else{var id=DB.newFirmaId();DB.firmalar.push(Object.assign({id:id,olusturma:new Date().toISOString(),son_temas:null},data));}renderStats();renderGrid();closeModal('firma-modal');}
function openTemasModal(id){DB.editTemasId=id;var err=document.getElementById('temas-err');err.style.display='none';err.textContent='';if(id){var t=DB.temas.find(function(x){return x.id===id;});document.getElementById('tmodal-title').textContent='Temas kaydını düzenle';document.getElementById('t-tarih').value=t.tarih;document.getElementById('t-kanal').value=t.kanal;document.getElementById('t-kisi').value=t.kisi||'';document.getElementById('t-ozet').value=t.ozet;document.getElementById('t-sonuc').value=t.sonuc||'beklemede';document.getElementById('t-adim').value=t.sonraki_adim||'';}else{document.getElementById('tmodal-title').textContent='Yeni temas kaydı';document.getElementById('t-tarih').value=new Date().toISOString().split('T')[0];document.getElementById('t-kanal').value='telefon';['t-kisi','t-ozet','t-adim'].forEach(function(id){document.getElementById(id).value='';});document.getElementById('t-sonuc').value='beklemede';}document.getElementById('temas-modal').classList.add('open');}
function saveTemas(){var ozet=document.getElementById('t-ozet').value.trim();if(!ozet){var err=document.getElementById('temas-err');err.textContent='Görüşme özeti zorunludur.';err.style.display='block';return;}var data={firma_id:DB.activeFirmaId,tarih:document.getElementById('t-tarih').value,kanal:document.getElementById('t-kanal').value,kisi:document.getElementById('t-kisi').value.trim(),ozet:ozet,sonuc:document.getElementById('t-sonuc').value,sonraki_adim:document.getElementById('t-adim').value.trim()};if(DB.editTemasId){var t=DB.temas.find(function(x){return x.id===DB.editTemasId;});Object.assign(t,data);}else{data.id=DB.newTemasId();DB.temas.push(data);}updateSonTemas(DB.activeFirmaId);var f=DB.firmalar.find(function(x){return x.id===DB.activeFirmaId;});if(f)renderDetailBody(f);renderGrid();closeModal('temas-modal');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function showPage(name){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});document.getElementById('page-'+name).classList.add('active');if(name==='list'){renderStats();renderGrid();}}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
init();
