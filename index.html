<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MestMall CRM</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,sans-serif}
input,select,textarea{width:100%;padding:8px 10px;font-size:13px;border:0.5px solid #ccc;border-radius:8px;background:#fff;color:#111}
input:focus,select:focus,textarea:focus{outline:none;border-color:#1d9e75;box-shadow:0 0 0 2px #1d9e7530}
button{cursor:pointer;font-family:inherit}
body{background:#f3f4f6;min-height:100vh}
.app{min-height:600px;background:#f3f4f6}
.topbar{background:#fff;border-bottom:1px solid #e5e7eb;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar h1{font-size:15px;font-weight:600;color:#111}
.topbar p{font-size:11px;color:#6b7280;margin-top:1px}
.btn{padding:7px 14px;border-radius:8px;border:1px solid #d1d5db;background:transparent;color:#111;font-size:13px}
.btn:hover{background:#f3f4f6}
.btn-green{background:#1d9e75;border-color:#1d9e75;color:#fff}
.btn-green:hover{background:#0f6e56}
.btn-red{border-color:#e24b4a;color:#a32d2d}
.btn-red:hover{background:#fcebeb}
.btn-sm{padding:5px 10px;font-size:12px}
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:2px 9px;border-radius:20px;border:1px solid transparent}
.b-olumlu{background:#e1f5ee;color:#085041;border-color:#9fe1cb}
.b-beklemede{background:#faeeda;color:#633806;border-color:#fac775}
.b-olumsuz{background:#fcebeb;color:#791f1f;border-color:#f7c1c1}
.b-iletisimde{background:#e6f1fb;color:#0c447c;border-color:#b5d4f4}
.b-baslanmadi{background:#f1efe8;color:#444441;border-color:#d3d1c7}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:16px 20px 0}
.stat{background:#fff;border-radius:8px;padding:10px 14px;border:1px solid #f0f0f0}
.stat-label{font-size:11px;color:#6b7280;margin-bottom:3px}
.stat-val{font-size:22px;font-weight:600;color:#111}
.toolbar{padding:12px 20px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.search-input{flex:1;min-width:150px}
.filt{padding:5px 12px;border-radius:20px;border:1px solid #e5e7eb;background:transparent;color:#6b7280;font-size:12px}
.filt:hover{background:#f3f4f6}
.filt.active{background:#1d9e75;border-color:#1d9e75;color:#fff}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px;padding:0 20px 24px}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:14px;cursor:pointer;transition:border-color .15s}
.card:hover{border-color:#1d9e75}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px}
.card-firma-adi{font-size:13px;font-weight:700;color:#111111;line-height:1.3;display:block;min-height:16px}
.card-meta{font-size:12px;color:#6b7280;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-not{font-size:11px;color:#9ca3af;border-top:1px solid #f3f4f6;padding-top:8px;margin-top:8px;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.screen{display:none}
.screen.active{display:block}
.detail-page{background:#f3f4f6;min-height:600px}
.back-bar{background:#fff;border-bottom:1px solid #e5e7eb;padding:10px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.back-bar-title{font-size:15px;font-weight:600;color:#111}
.back-bar-actions{margin-left:auto;display:flex;gap:8px}
.detail-body{max-width:700px;margin:0 auto;padding:20px}
.dcard{background:#fff;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;margin-bottom:16px}
.dcard-head{padding:12px 16px;border-bottom:1px solid #f3f4f6;display:flex;align-items:center;justify-content:space-between}
.dcard-title{font-size:11px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.05em}
.irow{display:flex;gap:16px;padding:10px 16px;border-bottom:1px solid #f9fafb}
.irow:last-child{border-bottom:none}
.ilabel{font-size:12px;color:#6b7280;width:120px;flex-shrink:0;padding-top:1px}
.ival{font-size:13px;color:#111;word-break:break-word;line-height:1.5}
.ival a{color:#1d9e75;text-decoration:none}
.ival a:hover{text-decoration:underline}
.temas-list{padding:4px 0}
.temas-item{display:flex;gap:12px;padding:12px 16px;border-bottom:1px solid #f9fafb}
.temas-item:last-child{border-bottom:none}
.temas-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-top:1px}
.ti-telefon{background:#e1f5ee}
.ti-eposta{background:#e6f1fb}
.ti-whatsapp{background:#eaf3de}
.ti-ziyaret{background:#eeedfe}
.temas-content{flex:1;min-width:0}
.temas-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:5px}
.temas-tarih{font-size:11px;color:#6b7280}
.temas-kanal-badge{font-size:11px;padding:1px 8px;border-radius:10px;background:#f3f4f6;color:#6b7280}
.temas-kisi{font-size:11px;color:#9ca3af}
.temas-ozet{font-size:13px;color:#111;line-height:1.5;margin-bottom:4px}
.temas-sonraki{font-size:11px;color:#854f0b;background:#faeeda;border-radius:4px;padding:3px 8px;display:inline-block;margin-top:2px}
.temas-acts{display:flex;gap:12px;margin-top:6px}
.tact{font-size:11px;color:#9ca3af;background:none;border:none;padding:0}
.tact:hover{color:#111}
.tact.red:hover{color:#a32d2d}
.empty-state{text-align:center;padding:40px 20px;color:#9ca3af;font-size:13px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:50;justify-content:center;align-items:flex-start;padding:60px 16px}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;border:1px solid #e5e7eb;width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
.modal-head{padding:14px 18px;border-bottom:1px solid #f3f4f6;display:flex;justify-content:space-between;align-items:center}
.modal-head h2{font-size:14px;font-weight:600;color:#111}
.xbtn{background:none;border:none;font-size:20px;color:#9ca3af;line-height:1;padding:0 2px}
.xbtn:hover{color:#111}
.modal-body{padding:18px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:11px;font-weight:600;color:#6b7280;margin-bottom:5px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.factions{display:flex;gap:8px;margin-top:18px}
.factions .btn{flex:1;text-align:center;padding:9px}
.errmsg{font-size:12px;color:#a32d2d;background:#fcebeb;border-radius:8px;padding:8px 12px;margin-bottom:12px}
textarea{resize:vertical;min-height:80px}
.no-results{grid-column:1/-1;text-align:center;padding:48px;color:#9ca3af;font-size:13px}
@media(max-width:640px){
  .stats{grid-template-columns:repeat(3,1fr)}
  .stats .stat:nth-child(4),.stats .stat:nth-child(5){display:none}
  .topbar{flex-wrap:wrap;gap:8px}
  .topbar .btn{width:100%}
  .toolbar{gap:6px}
  .filt{padding:4px 8px;font-size:11px}
  .grid{grid-template-columns:1fr;padding:0 12px 20px}
  .detail-body{padding:12px}
  .back-bar{flex-wrap:wrap;gap:6px}
  .back-bar-actions{margin-left:0;width:100%;display:flex;gap:6px}
  .back-bar-actions .btn{flex:1;text-align:center}
  .frow{grid-template-columns:1fr}
  .modal{margin:0 8px;max-height:92vh}
  .overlay{padding:20px 0;align-items:flex-end}
  .modal{border-radius:12px 12px 0 0}
  .irow{flex-direction:column;gap:4px}
  .ilabel{width:auto}
  .temas-meta{gap:5px}
  .stats{padding:12px 12px 0}
  .toolbar{padding:10px 12px}
  .grid{padding:0 12px 20px}
}
@media(max-width:400px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .stats .stat:nth-child(3){display:none}
}

.login-overlay{display:none;position:fixed;inset:0;background:#f3f4f6;z-index:1000;align-items:center;justify-content:center;padding:16px}
.login-overlay.show{display:flex}
.login-wrap{width:100%;max-width:400px}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo h1{font-size:22px;font-weight:600;color:#111;margin-bottom:4px}
.login-logo p{font-size:13px;color:#6b7280}
.login-card{background:#fff;border-radius:16px;border:1px solid #e5e7eb;padding:28px 24px}
.login-err{background:#fcebeb;color:#a32d2d;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px;display:none}
.login-fg{margin-bottom:16px}
.login-fg label{display:block;font-size:12px;font-weight:500;color:#6b7280;margin-bottom:6px}
.login-fg input{width:100%;padding:10px 14px;font-size:14px;border:1px solid #e5e7eb;border-radius:10px;background:#fff;color:#111;outline:none}
.login-fg input:focus{border-color:#1d9e75;box-shadow:0 0 0 3px #1d9e7520}
.login-btn{width:100%;padding:11px;background:#1d9e75;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px}
.login-btn:hover{background:#0f6e56}
.login-btn:disabled{opacity:.6;cursor:not-allowed}
.sifre-overlay{display:none;position:fixed;inset:0;background:#f3f4f6;z-index:1001;align-items:center;justify-content:center;padding:16px}
.sifre-overlay.show{display:flex}
</style>
</head>
<body>


<div class="login-overlay show" id="login-overlay">
  <div class="login-wrap">
    <div class="login-logo">
      <h1>MestMall CRM</h1>
      <p>Hedef firma yönetimi</p>
    </div>
    <div class="login-card">
      <div class="login-err" id="login-err"></div>
      <div class="login-fg">
        <label>Cep telefonu</label>
        <input type="tel" id="login-tel" placeholder="05320000000">
      </div>
      <div class="login-fg">
        <label>Şifre</label>
        <input type="password" id="login-sifre" placeholder="••••••••">
      </div>
      <button class="login-btn" id="login-btn" onclick="girisYap()">Giriş Yap</button>
    </div>
  </div>
</div>

<div class="sifre-overlay" id="sifre-overlay">
  <div class="login-wrap">
    <div class="login-logo">
      <h1>Şifre Değiştir</h1>
      <p>İlk girişiniz. Lütfen yeni şifrenizi belirleyin.</p>
    </div>
    <div class="login-card">
      <div class="login-err" id="sifre-err"></div>
      <div class="login-fg">
        <label>Yeni şifre (en az 6 karakter)</label>
        <input type="password" id="yeni-sifre" placeholder="Yeni şifreniz">
      </div>
      <div class="login-fg">
        <label>Yeni şifre tekrar</label>
        <input type="password" id="yeni-sifre2" placeholder="Şifrenizi tekrar girin">
      </div>
      <button class="login-btn" onclick="sifreDegistir()">Şifremi Kaydet</button>
    </div>
  </div>
</div>

<div id="root">

<div id="page-list" class="screen active app">
  <div class="topbar">
    <div><h1>MestMall CRM</h1><p>Hedef firma yönetimi</p></div>
    <div style="display:flex;gap:8px;align-items:center">
      <span id="user-ad" style="font-size:12px;color:#6b7280"></span>
      <button class="btn btn-green" onclick="openFirmaModal(null)">+ Yeni firma</button>
      <button class="btn" onclick="cikisYap()" style="font-size:12px">Çıkış</button>
    </div>
  </div>
  <div class="stats" id="stats-row"></div>
  <div class="toolbar">
    <input id="search" class="search-input" placeholder="Firma veya kişi ara..." oninput="renderGrid()">
    <button class="filt active" data-d="tumu" onclick="setFilter(this)">Tümü</button>
    <button class="filt" data-d="olumlu" onclick="setFilter(this)">Olumlu</button>
    <button class="filt" data-d="beklemede" onclick="setFilter(this)">Beklemede</button>
    <button class="filt" data-d="iletisimde" onclick="setFilter(this)">İletişimde</button>
    <button class="filt" data-d="olumsuz" onclick="setFilter(this)">Ulaşılamadı</button>
    <button class="filt" data-d="baslanmadi" onclick="setFilter(this)">Başlanmadı</button>
    <button class="filt" data-d="planli" onclick="setFilter(this)" id="filt-planli" style="position:relative">📅 Planlı<span id="plan-badge" style="display:none;position:absolute;top:-6px;right:-6px;background:#a32d2d;color:#fff;font-size:10px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:none;align-items:center;justify-content:center;padding:0 4px;line-height:16px"></span></button>
  </div>
  <div class="grid" id="firma-grid"></div>
</div>

<div id="page-detail" class="screen app detail-page">
  <div class="back-bar">
    <button class="btn btn-sm" onclick="showPage('list')">← Geri</button>
    <span class="back-bar-title" id="det-title"></span>
    <span id="det-badge"></span>
    <div class="back-bar-actions" id="det-actions"></div>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<div class="overlay" id="firma-modal">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-head"><h2 id="fmodal-title">Yeni firma ekle</h2><button class="xbtn" onclick="closeModal('firma-modal')">&times;</button></div>
    <div class="modal-body">
      <div id="firma-err" style="display:none" class="errmsg"></div>
      <div class="fg"><label>Firma adı *</label><input id="f-ad" placeholder="Firma adı girin"></div>
      <div class="frow">
        <div class="fg"><label>Web sitesi</label><input id="f-web" placeholder="www.firma.com"></div>
        <div class="fg"><label>Telefon</label><input id="f-tel" placeholder="0212 000 00 00"></div>
      </div>
      <div class="fg"><label>E-posta</label><input id="f-eposta" type="email" placeholder="info@firma.com"></div>
      <div class="frow">
        <div class="fg"><label>Referans kişi</label><input id="f-ref" placeholder="Ad soyad"></div>
        <div class="fg"><label>Odak kişi</label><input id="f-odak" placeholder="Ad, unvan"></div>
      </div>
      <div class="fg"><label>Ürün / firma notları</label><textarea id="f-not" placeholder="Ürünler, önemli notlar..."></textarea></div>
      <div class="fg"><label>Durum</label>
        <select id="f-durum">
          <option value="baslanmadi">Başlanmadı</option>
          <option value="iletisimde">İletişimde</option>
          <option value="beklemede">Beklemede</option>
          <option value="olumlu">Olumlu</option>
          <option value="olumsuz">Ulaşılamadı / Olumsuz</option>
        </select>
      </div>
      <div class="factions">
        <button class="btn" onclick="closeModal('firma-modal')">İptal</button>
        <button class="btn btn-green" onclick="saveFirma()">Kaydet</button>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="temas-modal">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-head"><h2 id="tmodal-title">Yeni temas kaydı</h2><button class="xbtn" onclick="closeModal('temas-modal')">&times;</button></div>
    <div class="modal-body">
      <div id="temas-err" style="display:none" class="errmsg"></div>
      <div class="fg"><label>Tarih</label><input type="date" id="t-tarih" style="max-width:180px"></div>
      <div class="fg">
        <label>Kanal (birden fazla seçilebilir)</label>
        <div style="display:flex;gap:20px;flex-wrap:wrap;margin-top:8px">
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;font-weight:400;cursor:pointer;white-space:nowrap"><input type="checkbox" id="t-kanal-telefon"> Telefon</label>
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;font-weight:400;cursor:pointer;white-space:nowrap"><input type="checkbox" id="t-kanal-eposta"> E-posta</label>
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;font-weight:400;cursor:pointer;white-space:nowrap"><input type="checkbox" id="t-kanal-whatsapp"> WhatsApp</label>
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;font-weight:400;cursor:pointer;white-space:nowrap"><input type="checkbox" id="t-kanal-ziyaret"> Ziyaret</label>
        </div>
      </div>
      <div class="frow">
        <div class="fg" style="border-right:1px solid #f0f0f0;padding-right:12px">
          <label style="font-size:11px;font-weight:700;color:#1d9e75;margin-bottom:8px;display:block">GÖRÜŞÜLEN (Firma)</label>
          <div class="fg"><label>Ad Soyad</label><input id="t-kisi" placeholder="Ad Soyad, Unvan"></div>
          <div class="fg"><label>Cep Tel</label><input id="t-kisi-tel" placeholder="0532 000 00 00"></div>
          <div class="fg"><label>E-posta</label><input id="t-kisi-eposta" type="email" placeholder="ali@firma.com"></div>
        </div>
        <div class="fg">
          <label style="font-size:11px;font-weight:700;color:#6b7280;margin-bottom:8px;display:block">GÖRÜŞEN (Ekip)</label>
          <div class="fg"><label>Ad Soyad</label><input id="t-yapan-kisi" placeholder="Ad Soyad"></div>
          <div class="fg"><label>Cep Tel</label><input id="t-yapan-tel" placeholder="0532 000 00 00"></div>
          <div class="fg"><label>E-posta</label><input id="t-yapan-eposta" type="email" placeholder="siz@mestmall.com"></div>
        </div>
      </div>
      <div class="fg"><label>Görüşme özeti *</label><textarea id="t-ozet" placeholder="Ne konuşuldu, ne söylendi..."></textarea></div>
      <div class="fg"><label>Sonuç</label>
        <select id="t-sonuc">
          <option value="beklemede">Beklemede</option>
          <option value="olumlu">Olumlu</option>
          <option value="cevap_yok">Cevap yok</option>
          <option value="olumsuz">Olumsuz</option>
        </select>
      </div>
      <div class="factions">
        <button class="btn" onclick="closeModal('temas-modal')">İptal</button>
        <button class="btn btn-green" onclick="saveTemas()">Kaydet</button>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="plan-modal">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-head"><h2>Sonraki iletişim planı</h2><button class="xbtn" onclick="closeModal('plan-modal')">&times;</button></div>
    <div class="modal-body">
      <div id="plan-err" style="display:none" class="errmsg"></div>
      <div class="fg"><label>Kiminle</label><input id="p-kisi" placeholder="Ad Soyad, Unvan"></div>
      <div class="fg"><label>Randevu tarihi *</label><input type="date" id="p-tarih"></div>
      <div class="fg">
        <label>İletişim kanalı</label>
        <div style="display:flex;gap:20px;flex-wrap:wrap;margin-top:8px">
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;font-weight:400;cursor:pointer;white-space:nowrap"><input type="checkbox" id="p-kanal-telefon"> Telefon</label>
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;font-weight:400;cursor:pointer;white-space:nowrap"><input type="checkbox" id="p-kanal-eposta"> E-posta</label>
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;font-weight:400;cursor:pointer;white-space:nowrap"><input type="checkbox" id="p-kanal-whatsapp"> WhatsApp</label>
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;font-weight:400;cursor:pointer;white-space:nowrap"><input type="checkbox" id="p-kanal-ziyaret"> Ziyaret</label>
        </div>
      </div>
      <div class="factions">
        <button class="btn" onclick="closeModal('plan-modal')">İptal</button>
        <button class="btn btn-green" onclick="savePlan()">Kaydet</button>
      </div>
    </div>
  </div>
</div>

</div>

<script>
var DB={firmalar:[],temas:[],editFirmaId:null,editTemasId:null,activeFirmaId:null,activeFilter:'tumu',_fid:1000,_tid:2000};

async function api(method,path,body){
  var opts={method:method,headers:getAuthHeader()};
  if(body)opts.body=JSON.stringify(body);
  var res=await fetch('/api/'+path,opts);
  if(!res.ok)throw new Error(await res.text());
  return res.json();
}

async function init(){
  if(!SESSION.token){document.getElementById('login-overlay').classList.add('show');return;}
  try{
    var firmalar=await api('GET','firmalar');
    DB.firmalar=firmalar;
    renderStats();renderGrid();updatePlanBadge();
    registerPush();
  }catch(e){
    document.getElementById('firma-grid').innerHTML='<div class="no-results">Veri yüklenemedi: '+e.message+'</div>';
  }
}

async function loadFirmaDetail(id){
  var data=await api('GET','firma/'+id);
  var firma=data;
  DB.temas=data.temas||[];
  var idx=DB.firmalar.findIndex(function(f){return f.id===id;});
  if(idx>=0)DB.firmalar[idx]=firma;
  return firma;
}

function renderStats(){

function setFilter(btn){document.querySelectorAll('.filt').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');DB.activeFilter=btn.dataset.d;renderGrid();}

function planSign(f){
  if(!f.plan||!f.plan.tarih)return null;
  var today=new Date();today.setHours(0,0,0,0);
  var planDate=new Date(f.plan.tarih);planDate.setHours(0,0,0,0);
  var diff=Math.round((planDate-today)/(1000*60*60*24));
  if(diff<0)return {color:'#a32d2d',bg:'#fcebeb',label:'📅 '+f.plan.tarih+' (gecikti)'};
  if(diff<=1)return {color:'#854f0b',bg:'#faeeda',label:'📅 '+f.plan.tarih+(diff===0?' (bugün)':' (yarın)')};
  return null;
}

function updatePlanBadge(){
  var today=new Date();today.setHours(0,0,0,0);
  var count=DB.firmalar.filter(function(f){
    if(!f.plan||!f.plan.tarih)return false;
    var d=new Date(f.plan.tarih);d.setHours(0,0,0,0);
    return d<=today;
  }).length;
  var badge=document.getElementById('plan-badge');
  if(!badge)return;
  if(count>0){badge.textContent=count;badge.style.display='inline-flex';}
  else{badge.style.display='none';}
}

function renderGrid(){
  var q=document.getElementById('search').value.toLowerCase();
  var list=DB.firmalar.filter(function(f){
    var matchF=DB.activeFilter==='tumu'||f.durum===DB.activeFilter||(DB.activeFilter==='planli'&&f.plan&&f.plan.tarih);
    var matchQ=!q||f.ad.toLowerCase().includes(q)||(f.odak_kisi||'').toLowerCase().includes(q);
    return matchF&&matchQ;
  }).sort(function(a,b){return a.ad.localeCompare(b.ad);});
  var grid=document.getElementById('firma-grid');grid.innerHTML='';
  if(!list.length){grid.innerHTML='<div class="no-results">Sonuç bulunamadı.</div>';return;}
  list.forEach(function(f){
    var div=document.createElement('div');div.className='card';div.onclick=function(){showDetail(f.id);};
    var header=document.createElement('div');header.className='card-header';
    var adSpan=document.createElement('span');adSpan.className='card-firma-adi';adSpan.textContent=f.ad;
    var badgeEl=document.createElement('span');badgeEl.innerHTML=badge(f.durum);
    header.appendChild(adSpan);header.appendChild(badgeEl);div.appendChild(header);
    if(f.odak_kisi){var m=document.createElement('div');m.className='card-meta';m.textContent=f.odak_kisi;div.appendChild(m);}
    if(f.telefon){var t=document.createElement('div');t.className='card-meta';t.textContent=f.telefon;div.appendChild(t);}
    if(f.son_temas){var s=document.createElement('div');s.className='card-meta';s.style.marginTop='4px';s.textContent='Son temas: '+f.son_temas;div.appendChild(s);}
    if(f.urun_notlari){var n=document.createElement('div');n.className='card-not';n.textContent=f.urun_notlari;div.appendChild(n);}
    var sign=planSign(f);
    if(sign){var p=document.createElement('div');p.style.cssText='margin-top:8px;padding:4px 8px;border-radius:6px;font-size:11px;font-weight:600;background:'+sign.bg+';color:'+sign.color;p.textContent=sign.label;div.appendChild(p);}
    grid.appendChild(div);
  });
}

  var data={firma_id:DB.activeFirmaId,tarih:document.getElementById('t-tarih').value,kanal:kanallar,kisi:document.getElementById('t-kisi').value.trim(),kisi_tel:document.getElementById('t-kisi-tel').value.trim(),kisi_eposta:document.getElementById('t-kisi-eposta').value.trim(),yapan_kisi:yapanKisi,yapan_tel:yapanTel,yapan_eposta:yapanEposta,ozet:ozet,sonuc:document.getElementById('t-sonuc').value};

    if(idx>=0)DB.temas[idx]=updated;
  }else{
    var created=await api('POST','temas',data);

    var firma=DB.firmalar.find(function(f){return f.id===DB.activeFirmaId;});

  if(f)renderDetailBody(f);
  renderGrid();
  closeModal('temas-modal');
}

function urlBase64ToUint8Array(base64String){
  var padding='='.repeat((4-base64String.length%4)%4);
  var base64=(base64String+padding).replace(/-/g,'+').replace(/_/g,'/');
  var rawData=window.atob(base64);
  var outputArray=new Uint8Array(rawData.length);
  for(var i=0;i<rawData.length;++i){outputArray[i]=rawData.charCodeAt(i);}
  return outputArray;
}
